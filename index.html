<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE ADMIN PANEL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; text-align: left !important; }
        body { background-color: #f4f7fa; padding: 10px; font-family: 'Courier New', monospace; }
        
        .header { 
            background: #315195; color: #fff; padding: 15px; 
            font-size: 16px; font-weight: bold; border-radius: 4px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
        }

        .log-card { 
            background: #fff; border-left: 8px solid #e31e24; 
            margin-bottom: 12px; padding: 15px; border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%;
        }

        .detail-text { 
            color: #000; font-size: 18px; font-weight: 900; 
            white-space: pre-wrap; line-height: 1.5; display: block;
        }

        .meta { 
            display: block; margin-top: 10px; font-size: 12px; 
            color: #666; border-top: 1px dashed #ccc; padding-top: 8px;
        }

        .status { font-size: 12px; color: #00ff00; }
    </style>
</head>
<body>

    <div class="header">
        <span>LIVE TERMINAL <span class="status">● ONLINE</span></span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">Syncing Data...</div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                // Cache bypass karne ke liye timestamp add kiya hai
                const response = await fetch(workerURL + '?t=' + new Date().getTime());
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                document.getElementById('count').innerText = data.length;

                if (data.length === 0) {
                    container.innerHTML = "<p style='text-align:center !important;'>No Logs Found.</p>";
                    return;
                }

                // Data mapping
                container.innerHTML = data.map(item => `
                    <div class="log-card">
                        <span class="detail-text">${item.detail || 'No Detail'}</span>
                        <span class="meta">ID: ${item.id} | Time: ${item.time}</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        // Har 3 second mein auto-refresh
        setInterval(fetchLogs, 3000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
