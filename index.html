<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL - LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            padding: 8px; 
            font-family: 'Consolas', 'Courier New', monospace; 
        }
        
        /* Header Section */
        .header { 
            background: #f1f1f1; 
            color: #333; 
            padding: 10px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 2px;
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }

        /* Red Bold Number on Right Top */
        #count {
            color: #ff0000; /* Pure Red */
            font-size: 16px; 
            font-weight: 900; /* Extra Bold */
        }

        .status-dot { color: #00a859; animation: blink 1s infinite; margin-right: 4px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Full Screen Black Card - Ultra Patla */
        .log-card { 
            background: #000000; 
            margin-bottom: 4px; 
            padding: 6px 10px; 
            border-radius: 2px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Small White Text */
        .detail-text { 
            color: #ffffff; 
            font-size: 11.5px; 
            white-space: pre-wrap; 
            line-height: 1.3;
            word-break: break-all;
        }

        /* Meta Info (Only ID & Time) */
        .meta { 
            display: block; 
            margin-top: 4px; 
            font-size: 8.5px; 
            color: #777; 
            text-align: right;
            border-top: 1px solid #222;
            padding-top: 3px;
        }

        #logsContainer { width: 100%; }
        .loading { font-size: 12px; color: #999; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <span><span class="status-dot">●</span> LIVE_TERMINAL</span>
        <span id="count">0</span> </div>

    <div id="logsContainer">
        <p class="loading">Connecting to server...</p>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(`${workerURL}?t=${Date.now()}`);
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                document.getElementById('count').innerText = data.length;

                if (!data || data.length === 0) {
                    container.innerHTML = "<p class='loading'>Waiting for data...</p>";
                    return;
                }

                // Building the list - "Visit" removed
                container.innerHTML = data.map(item => `
                    <div class="log-card">
                        <div class="detail-text">${item.detail || ''}</div>
                        <div class="meta">ID:${item.id} | ${item.time}</div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Connection Error");
            }
        }

        // 2 Second Refresh
        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
