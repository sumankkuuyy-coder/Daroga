<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Poora background black */
        body { background-color: #000000; color: #ffffff; }

        /* Header: Black & Silver */
        .header {
            background: #1a1a1a;
            color: #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        .header h1 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        
        /* White Badge for Count */
        .v-badge {
            background: #ffffff;
            color: #000000;
            padding: 2px 15px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 20px;
        }

        .container { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        /* Rows: Pure Black & White */
        .data-row {
            background: #111111;
            padding: 18px;
            border-radius: 4px;
            border: 1px solid #333;
            /* Side line ko bhi white rakha hai for B&W look */
            border-left: 4px solid #ffffff; 
            font-size: 18px;
            font-weight: 600;
            color: #eeeeee;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Status Text */
        .status-text { text-align: center; font-size: 10px; color: #444; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Feed</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <div class="status-text">Encrypted Connection Active</div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let oldHash = "";

        async function refreshData() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const newHash = JSON.stringify(data);
                if (newHash === oldHash) return;
                oldHash = newHash;

                if (!data) return;

                // Total rows count
                badge.innerText = data.length;

                // Render Clean Data (Visit ignore, Data show)
                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || log.type.includes("VISIT")) {
                        return ""; 
                    }
                    // B&W theme mein sirf ek hi style rakha hai clean look ke liye
                    return `<div class="data-row">${log.detail}</div>`;
                }).join('');

            } catch (e) { console.log("Updating..."); }
        }

        setInterval(refreshData, 2000);
        window.onload = refreshData;
    </script>
</body>
</html>
