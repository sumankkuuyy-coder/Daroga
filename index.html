<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE ADMIN TERMINAL</title>
    <style>
        /* Extreme Left Alignment & Professional Look */
        * { margin: 0; padding: 0; box-sizing: border-box; text-align: left !important; }
        
        body { background-color: #f0f4f8; padding: 10px; font-family: 'Courier New', monospace; }
        
        .header { 
            background: #004a99; color: #fff; padding: 15px; 
            font-size: 16px; font-weight: bold; border-radius: 4px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            border-bottom: 3px solid #e31e24;
        }

        /* Har entry ka alag Card */
        .log-card { 
            background: #ffffff; 
            border-left: 8px solid #315195; 
            margin-bottom: 12px; 
            padding: 15px; 
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            animation: slideIn 0.3s ease-out; /* Naya data aane par effect */
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .detail-text { 
            color: #000; 
            font-size: 17px; 
            font-weight: 900; /* Ekdum Dark Bold */
            white-space: pre-wrap; 
            word-break: break-all;
            line-height: 1.6;
            display: block;
        }

        .meta { 
            display: block; 
            margin-top: 10px; 
            font-size: 11px; 
            color: #666; 
            border-top: 1px dashed #ddd;
            padding-top: 8px;
        }

        .status-dot { color: #00ff00; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <span><span class="status-dot">●</span> LIVE TERMINAL</span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">Connecting to database...</div>

    <script>
        // APNA WORKER URL YAHA CHECK KARO
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchNewData() {
            try {
                const response = await fetch(workerURL);
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                document.getElementById('count').innerText = "Total: " + data.length;

                if (data.length === 0) {
                    container.innerHTML = "<div style='text-align:center !important; margin-top:50px; color:#888;'>Waiting for new logs...</div>";
                    return;
                }

                // .map se cards banenge. Worker se data pehle hi DESC (newest first) aa raha hai
                container.innerHTML = data.map(item => `
                    <div class="log-card">
                        <span class="detail-text">${item.detail}</span>
                        <span class="meta">⏱ Received: ${item.time}</span>
                    </div>
                `).join('');

            } catch (err) {
                console.log("Sync Error...");
            }
        }

        // Har 3 second mein auto-check
        setInterval(fetchNewData, 3000);
        window.onload = fetchNewData;
    </script>
</body>
</html>
