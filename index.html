<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; text-align: left !important; }
        body { background: #fff; padding: 5px; }
        
        .header { width: 100%; padding: 10px 0; border-bottom: 2px solid #000; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; }
        .log-row { border-bottom: 1px solid #000; width: 100%; }
        
        .log-cell { 
            padding: 8px 0; 
            font-family: monospace; /* Ekdum barabar dikhne ke liye */
            font-size: 16px; 
            font-weight: 900; 
            color: #000;
            white-space: pre-wrap; 
            word-break: break-all;
            display: block;
            width: 100%;
        }
        .time { font-size: 10px; color: #666; font-weight: 400; display: block; }
    </style>
</head>
<body>
    <div class="header"><b>LIVE (LEFT ALIGNED)</b></div>
    <table><tbody id="logsDisplay"></tbody></table>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                if (JSON.stringify(data) === lastHash) return;
                lastHash = JSON.stringify(data);

                document.getElementById('logsDisplay').innerHTML = data.map(log => {
                    if (log.detail === "COUNT") return "";
                    return `<tr class="log-row"><td class="log-cell">${log.detail}<span class="time">${log.time}</span></td></tr>`;
                }).join('');
            } catch (e) {}
        }
        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
