<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Compact</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #ffffff; color: #333; padding: 5px; }

        /* Small Header */
        .header {
            background: #fff;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Small Count Badge */
        .v-badge {
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 14px;
        }

        .container { 
            padding-top: 10px;
            display: flex; 
            flex-direction: column; 
            gap: 6px; /* Space kam kar diya */
        }

        /* Chota Compact Card */
        .data-row {
            background: #f9f9f9;
            padding: 10px 12px; /* Padding kam kar di */
            border-radius: 6px;
            border: 1px solid #eee;
            font-size: 14px; /* Text chota kar diya */
            font-weight: 700;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Color Coding */
        .green-box { color: #1e7e34; border-left: 4px solid #28a745; }
        .red-box { color: #bd2130; border-left: 4px solid #dc3545; }

        .time {
            display: block;
            font-size: 9px;
            color: #bbb;
            margin-top: 4px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div class="container" id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                if (!data) return;
                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) {
                        return ""; 
                    }

                    // OTP check for Red color
                    const isOtp = log.detail.toLowerCase().includes("otp:-");
                    const colorClass = isOtp ? "red-box" : "green-box";

                    return `
                        <div class="data-row ${colorClass}">
                            ${log.detail}
                            <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Updating..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
