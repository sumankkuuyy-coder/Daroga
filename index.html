<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Live</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; padding: 10px; }
        
        .top-header { 
            background: #cd0000; color: white; padding: 12px; 
            text-align: center; border-radius: 5px; margin-bottom: 15px;
            font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
        }
        
        .live-indicator {
            display: inline-block; width: 10px; height: 10px;
            background: #fff; border-radius: 50%; margin-right: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #log-container { display: flex; flex-direction: column; gap: 10px; }

        .log-card {
            background: #111; border: 1px solid #333; border-left: 4px solid #cd0000;
            border-radius: 4px; overflow: hidden;
        }

        .card-header { 
            padding: 8px 12px; background: #1a1a1a; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        .badge { 
            padding: 2px 8px; border-radius: 3px; font-size: 11px; 
            font-weight: bold; color: #fff; background: #cd0000;
        }
        
        .time { font-size: 10px; color: #888; }
        
        .card-body { padding: 12px; }
        .data-box { 
            color: #ff4d4d; font-family: monospace;
            font-size: 14px; line-height: 1.5; white-space: pre-wrap;
        }

        .empty { text-align: center; padding: 50px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-header">
        <span class="live-indicator"></span>LIVE MONITOR
    </div>

    <div id="log-container">
        <div class="empty">NO DATA FOUND</div>
    </div>

    <script>
        const WORKER_URL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(WORKER_URL);
                const results = await response.json();
                const container = document.getElementById('log-container');

                if (!results || results.length === 0) {
                    container.innerHTML = '<div class="empty">NO DATA FOUND</div>';
                    return;
                }

                let html = '';
                results.forEach(row => {
                    const cleanContent = row.content.replace(/ \| /g, '\n');
                    html += `
                        <div class="log-card">
                            <div class="card-header">
                                <span class="badge">${row.type}</span>
                                <span class="time">${row.time}</span>
                            </div>
                            <div class="card-body">
                                <div class="data-box">${cleanContent}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('log-container').innerHTML = '<div class="empty">CONNECTION ERROR</div>';
            }
        }

        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
