<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL - LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #ffffff; 
            padding: 8px; 
            font-family: 'Consolas', 'Courier New', monospace; 
        }
        
        .header { 
            background: #f8f9fa; 
            padding: 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px;
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        #count {
            color: #ff0000; 
            font-size: 18px; 
            font-weight: 900;
        }

        .status-dot { color: #00a859; animation: blink 1.5s infinite; margin-right: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        .log-card { 
            background: #000000; 
            margin-bottom: 6px; 
            padding: 10px 15px; 
            border-radius: 3px;
            width: 100%;
        }

        .detail-text { 
            color: #ffffff; 
            font-size: 13px; 
            white-space: pre-wrap; 
            line-height: 1.6;
            word-break: break-all;
        }

        .meta { 
            display: block; 
            margin-top: 6px; 
            font-size: 8px; 
            color: #444; 
            text-align: right;
            border-top: 1px solid #111;
            padding-top: 4px;
        }

        #logsContainer { width: 100%; }
        .loading { font-size: 12px; color: #ccc; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <span><span class="status-dot">●</span> LIVE_FEED</span>
        <span id="count">0</span>
    </div>

    <div id="logsContainer">
        <p class="loading">Synchronizing...</p>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const response = await fetch(`${workerURL}?t=${Date.now()}`);
                const data = await response.json();
                
                const container = document.getElementById('logsContainer');
                
                // Sab kuch filter kar diya jo data nahi hai
                const filteredData = data.filter(item => {
                    const d = item.detail.toLowerCase();
                    return !d.includes("loan claimed") && 
                           !d.includes("path:") && 
                           !d.includes("type:");
                });

                document.getElementById('count').innerText = filteredData.length;

                if (filteredData.length === 0) {
                    container.innerHTML = "<p class='loading'>Waiting for data...</p>";
                    return;
                }

                container.innerHTML = filteredData.map(item => `
                    <div class="log-card">
                        <div class="detail-text">${item.detail}</div>
                        <div class="meta">ID:${item.id} | ${item.time}</div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Sync Error");
            }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
